openapi: 3.0.1
info:
  title: Restaurants Microservice API
  description: API for restaurant management in Plaza de Comidas system
  version: 1.0.0
  contact:
    name: Mateo Castro
    email: mateocastro1297@gmail.com

servers:
  - url: http://localhost:8082/api/v1/restaurants
    description: Local server

tags:
  - name: Restaurants
    description: Restaurant management operations
  - name: Dishes
    description: Dish management operations for restaurants
  - name: Orders
    description: Order management operations for restaurants

paths:
  /admin/restaurant:
    post:
      summary: Create a new restaurant
      operationId: createRestaurant
      tags:
        - Restaurants
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../openapi/schemas/schemas-restaurant.yaml#/components/schemas/RestaurantRequest'
      responses:
        '200':
          description: Restaurant created successfully
          content:
            application/json:
              schema:
                $ref: '../openapi/schemas/schemas-restaurant.yaml#/components/schemas/RestaurantResponse'
        '400':
          description: Invalid input data
          content:
            application/json:
              schema:
                $ref: '../openapi/schemas/schemas-error.yaml#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '../openapi/schemas/schemas-error.yaml#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden - Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '../openapi/schemas/schemas-error.yaml#/components/schemas/ErrorResponse'
        '404':
          description: Admin not found
          content:
            application/json:
              schema:
                $ref: '../openapi/schemas/schemas-error.yaml#/components/schemas/ErrorResponse'
        '409':
          description: Conflict - NIT already exists
          content:
            application/json:
              schema:
                $ref: '../openapi/schemas/schemas-error.yaml#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '../openapi/schemas/schemas-error.yaml#/components/schemas/ErrorResponse'

  /owner/dish:
    post:
      summary: Create a new dish
      operationId: createDish
      tags:
        - Dishes
      security:
        - bearerAuth: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../openapi/schemas/schemas-dish.yaml#/components/schemas/DishRequest'
      responses:
        '200':
          description: Dish created successfully
          content:
            application/json:
              schema:
                $ref: '../openapi/schemas/schemas-dish.yaml#/components/schemas/DishResponse'
        '400':
          description: Invalid input data
          content:
            application/json:
              schema:
                $ref: '../openapi/schemas/schemas-error.yaml#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '../openapi/schemas/schemas-error.yaml#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden - User is not the restaurant owner
          content:
            application/json:
              schema:
                $ref: '../openapi/schemas/schemas-error.yaml#/components/schemas/ErrorResponse'
        '404':
          description: Restaurant or category not found
          content:
            application/json:
              schema:
                $ref: '../openapi/schemas/schemas-error.yaml#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '../openapi/schemas/schemas-error.yaml#/components/schemas/ErrorResponse'

  /owner/dish/{dishId}:
    put:
      summary: Update dish price and description
      operationId: updateDish
      tags:
        - Dishes
      security:
        - bearerAuth: [ ]
      parameters:
        - name: dishId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../openapi/schemas/schemas-dish.yaml#/components/schemas/DishUpdateRequest'
      responses:
        '200':
          description: Dish updated successfully
          content:
            application/json:
              schema:
                $ref: '../openapi/schemas/schemas-dish.yaml#/components/schemas/DishResponse'
        '400':
          description: Invalid input data
          content:
            application/json:
              schema:
                $ref: '../openapi/schemas/schemas-error.yaml#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden - User is not the restaurant owner
          content:
            application/json:
              schema:
                $ref: '../openapi/schemas/schemas-error.yaml#/components/schemas/ErrorResponse'
        '404':
          description: Dish not found
          content:
            application/json:
              schema:
                $ref: '../openapi/schemas/schemas-error.yaml#/components/schemas/ErrorResponse'

  /owner/dish/{dishId}/toggle-active:
    patch:
      summary: Enable or disable a dish
      operationId: toggleDishActive
      tags:
        - Dishes
      security:
        - bearerAuth: [ ]
      parameters:
        - name: dishId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Dish status toggled successfully
          content:
            application/json:
              schema:
                $ref: '../openapi/schemas/schemas-dish.yaml#/components/schemas/DishResponse'
        '403':
          description: Forbidden - User is not the restaurant owner
          content:
            application/json:
              schema:
                $ref: '../openapi/schemas/schemas-error.yaml#/components/schemas/ErrorResponse'
        '404':
          description: Dish not found
          content:
            application/json:
              schema:
                $ref: '../openapi/schemas/schemas-error.yaml#/components/schemas/ErrorResponse'

  /owner/employee:
    post:
      summary: Associate employee to restaurant
      operationId: createRestaurantEmployee
      tags:
        - Restaurants
      security:
        - bearerAuth: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../openapi/schemas/schemas-restaurant-employee.yaml#/components/schemas/RestaurantEmployeeRequest'
      responses:
        '200':
          description: Employee associated successfully
          content:
            application/json:
              schema:
                $ref: '../openapi/schemas/schemas-restaurant-employee.yaml#/components/schemas/RestaurantEmployeeResponse'
        '403':
          description: Forbidden - User is not the restaurant owner
        '404':
          description: Restaurant not found
        '409':
          description: Employee already associated to this restaurant

  /employees/orders:
    get:
      summary: List orders filtered by status
      operationId: listOrdersByStatus
      tags:
        - Orders
      security:
        - bearerAuth: [ ]
      parameters:
        - name: status
          in: query
          required: true
          schema:
            type: string
            enum: [ PENDING, IN_PREPARATION, READY, DELIVERED, CANCELLED ]
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 0
            minimum: 0
        - name: size
          in: query
          required: false
          schema:
            type: integer
            default: 10
            minimum: 1
      responses:
        '200':
          description: Orders listed successfully
          content:
            application/json:
              schema:
                $ref: '../openapi/schemas/schemas-order.yaml#/components/schemas/PagedOrderResponse'
        '403':
          description: Employee not assigned to any restaurant
        '404':
          description: Restaurant not found

  /employees/orders/{orderId}/assign:
    patch:
      summary: Assign employee to order and change status to IN_PREPARATION
      operationId: assignEmployeeToOrder
      tags:
        - Orders
      security:
        - bearerAuth: [ ]
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Order assigned successfully
          content:
            application/json:
              schema:
                $ref: '../openapi/schemas/schemas-order.yaml#/components/schemas/OrderResponse'
        '400':
          description: Order is not in PENDING status
          content:
            application/json:
              schema:
                $ref: '../openapi/schemas/schemas-error.yaml#/components/schemas/ErrorResponse'
        '403':
          description: Order does not belong to employee restaurant
          content:
            application/json:
              schema:
                $ref: '../openapi/schemas/schemas-error.yaml#/components/schemas/ErrorResponse'
        '404':
          description: Order not found
          content:
            application/json:
              schema:
                $ref: '../openapi/schemas/schemas-error.yaml#/components/schemas/ErrorResponse'

  /employees/orders/{orderId}/notify-ready:
    patch:
      summary: Notify client that order is ready
      operationId: notifyOrderReady
      tags:
        - Orders
      security:
        - bearerAuth: [ ]
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Order marked as ready and client notified
          content:
            application/json:
              schema:
                $ref: '../openapi/schemas/schemas-order.yaml#/components/schemas/OrderResponse'
        '400':
          description: Order is not IN_PREPARATION
        '403':
          description: Order does not belong to employee restaurant
        '404':
          description: Order not found

  /employees/orders/{orderId}/deliver:
    patch:
      summary: Deliver order by validating security pin
      operationId: deliverOrder
      tags:
        - Orders
      security:
        - bearerAuth: [ ]
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../openapi/schemas/schemas-order.yaml#/components/schemas/DeliverOrderRequest'
      responses:
        '200':
          description: Order delivered successfully
          content:
            application/json:
              schema:
                $ref: '../openapi/schemas/schemas-order.yaml#/components/schemas/OrderResponse'
        '400':
          description: Invalid security pin or order not in READY status
          content:
            application/json:
              schema:
                $ref: '../openapi/schemas/schemas-error.yaml#/components/schemas/ErrorResponse'
        '403':
          description: Order does not belong to employee restaurant
          content:
            application/json:
              schema:
                $ref: '../openapi/schemas/schemas-error.yaml#/components/schemas/ErrorResponse'
        '404':
          description: Order not found
          content:
            application/json:
              schema:
                $ref: '../openapi/schemas/schemas-error.yaml#/components/schemas/ErrorResponse'

  /clients/restaurants:
    get:
      summary: List all restaurants paginated and alphabetically ordered
      operationId: listRestaurants
      tags:
        - Restaurants
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 0
            minimum: 0
        - name: size
          in: query
          required: false
          schema:
            type: integer
            default: 10
            minimum: 1
      responses:
        '200':
          description: Restaurants listed successfully
          content:
            application/json:
              schema:
                $ref: '../openapi/schemas/schemas-restaurant.yaml#/components/schemas/PagedRestaurantResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '../openapi/schemas/schemas-error.yaml#/components/schemas/ErrorResponse'

  /clients/restaurants/{restaurantId}/dishes:
    get:
      summary: List dishes of a restaurant filtered by category
      operationId: listDishesByRestaurant
      tags:
        - Dishes
      parameters:
        - name: restaurantId
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: categoryId
          in: query
          required: false
          schema:
            type: integer
            format: int64
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 0
            minimum: 0
        - name: size
          in: query
          required: false
          schema:
            type: integer
            default: 10
            minimum: 1
      responses:
        '200':
          description: Dishes listed successfully
          content:
            application/json:
              schema:
                $ref: '../openapi/schemas/schemas-dish.yaml#/components/schemas/PagedDishResponse'
        '404':
          description: Restaurant not found
          content:
            application/json:
              schema:
                $ref: '../openapi/schemas/schemas-error.yaml#/components/schemas/ErrorResponse'

  /clients/orders:
    post:
      summary: Place a new order
      operationId: createOrder
      tags:
        - Orders
      security:
        - bearerAuth: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../openapi/schemas/schemas-order.yaml#/components/schemas/OrderRequest'
      responses:
        '200':
          description: Order placed successfully
          content:
            application/json:
              schema:
                $ref: '../openapi/schemas/schemas-order.yaml#/components/schemas/OrderResponse'
        '400':
          description: Invalid input or dish not available
        '409':
          description: Client already has an active order

  /clients/orders/{orderId}/cancel:
    patch:
      summary: Cancel a pending order
      operationId: cancelOrder
      tags:
        - Orders
      security:
        - bearerAuth: [ ]
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Order cancelled successfully
          content:
            application/json:
              schema:
                $ref: '../openapi/schemas/schemas-order.yaml#/components/schemas/OrderResponse'
        '400':
          description: Order cannot be cancelled - already in preparation
          content:
            application/json:
              schema:
                $ref: '../openapi/schemas/schemas-error.yaml#/components/schemas/ErrorResponse'
        '403':
          description: Order does not belong to this client
          content:
            application/json:
              schema:
                $ref: '../openapi/schemas/schemas-error.yaml#/components/schemas/ErrorResponse'
        '404':
          description: Order not found
          content:
            application/json:
              schema:
                $ref: '../openapi/schemas/schemas-error.yaml#/components/schemas/ErrorResponse'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "Enter your JWT token in the format: Bearer <token>"