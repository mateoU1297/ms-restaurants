components:
  schemas:
    RestaurantRequest:
      type: object
      required:
        - name
        - nit
        - address
        - phone
        - urlLogo
        - ownerId
      properties:
        name:
          type: string
          maxLength: 100
          pattern: '^(?![0-9]+$).+'
          description: Restaurant name (cannot contain only numbers)
          example: "La Hamburguesería 123"
        nit:
          type: string
          pattern: '^[0-9]+$'
          minLength: 5
          maxLength: 20
          description: NIT (numbers only, 5-20 digits)
          example: "901234567"
        address:
          type: string
          maxLength: 200
          description: Restaurant address
          example: "Calle 123 #45-67"
        phone:
          type: string
          pattern: '^\+?[0-9]{7,13}$'
          maxLength: 13
          description: Phone number (7-13 digits, can start with +)
          example: "+573001234567"
        urlLogo:
          type: string
          pattern: '^(http|https)://.*$'
          description: Logo URL
          example: "https://storage.com/logo123.png"
        ownerId:
          type: integer
          format: int64
          minimum: 1
          description: Owner user ID
          example: 1

    RestaurantResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        name:
          type: string
          example: "La Hamburguesería 123"
        nit:
          type: string
          example: "901234567"
        address:
          type: string
          example: "Calle 123 #45-67"
        phone:
          type: string
          example: "+573001234567"
        urlLogo:
          type: string
          example: "https://storage.com/logo123.png"
        ownerId:
          type: integer
          format: int64
          example: 1
        createdAt:
          type: string
          format: date-time
          example: "2026-03-02T10:30:45.123Z"