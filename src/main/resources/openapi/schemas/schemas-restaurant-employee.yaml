components:
  schemas:
    RestaurantEmployeeRequest:
      type: object
      required:
        - employeeId
        - restaurantId
      properties:
        employeeId:
          type: integer
          format: int64
          minimum: 1
          example: 10
        restaurantId:
          type: integer
          format: int64
          minimum: 1
          example: 1

    RestaurantEmployeeResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        employeeId:
          type: integer
          format: int64
          example: 10
        restaurantId:
          type: integer
          format: int64
          example: 1
        createdAt:
          type: string
          format: date-time