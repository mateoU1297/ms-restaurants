components:
  schemas:
    OrderDishRequest:
      type: object
      required:
        - dishId
        - quantity
      properties:
        dishId:
          type: integer
          format: int64
          minimum: 1
          example: 1
        quantity:
          type: integer
          minimum: 1
          example: 2

    OrderRequest:
      type: object
      required:
        - restaurantId
        - dishes
      properties:
        restaurantId:
          type: integer
          format: int64
          minimum: 1
          example: 1
        dishes:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/OrderDishRequest'

    OrderDishResponse:
      type: object
      properties:
        dishId:
          type: integer
          format: int64
          example: 1
        quantity:
          type: integer
          example: 2

    OrderResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        clientId:
          type: integer
          format: int64
          example: 5
        restaurantId:
          type: integer
          format: int64
          example: 1
        status:
          type: string
          enum: [ PENDING, IN_PREPARATION, READY, DELIVERED, CANCELLED ]
          example: "PENDING"
        dishes:
          type: array
          items:
            $ref: '#/components/schemas/OrderDishResponse'
        createdAt:
          type: string
          format: date-time

    PagedOrderResponse:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/OrderResponse'
        pageNumber:
          type: integer
        pageSize:
          type: integer
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer
        last:
          type: boolean

    DeliverOrderRequest:
      type: object
      required:
        - securityPin
      properties:
        securityPin:
          type: string
          minLength: 6
          maxLength: 6
          pattern: '^[0-9]{6}$'
          example: "123456"